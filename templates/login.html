<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - Demo Co Inn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #210333 0%, #5a2d82 50%, #210333 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: 'Poppins', sans-serif; margin: 0;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 25px;
            padding: 40px; width: 100%; max-width: 400px; color: white; text-align: center;
        }
        .error-box {
            background: rgba(255, 0, 0, 0.2); border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff9999; padding: 10px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.2); border: none; border-radius: 12px;
            color: white !important; padding: 12px 15px; margin-bottom: 20px;
        }
        .form-control::placeholder { color: rgba(255, 255, 255, 0.7); }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.3); color: white !important; outline: none; box-shadow: none;
        }
        .btn-custom {
            background: #ffffff; color: #5a2d82; border: none; border-radius: 12px;
            padding: 12px; font-weight: bold; width: 100%; transition: 0.3s;
        }
        .btn-custom:hover { background: #ffccff; transform: translateY(-2px); }
        .link-text { color: #ffccff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="glass-card shadow">
        <i class="bi bi-shield-lock-fill" style="font-size: 50px; color: #ffccff;"></i>
        <h2 class="fw-bold mb-4">Admin Login</h2>
        
        {% if error %}
            <div class="error-box"><i class="bi bi-exclamation-circle"></i> {{ error }}</div>
        {% endif %}

        <form method="post">
            <input type="text" name="username" class="form-control" placeholder="Username" required>
            <input type="password" name="password" class="form-control" placeholder="Password" required>
            <button type="submit" class="btn btn-custom">SIGN IN</button>
        </form>
        <div class="mt-3">
                <a href="/forgot_password" class="link-text small">Forgot Password?</a>
        </div>
        <div class="mt-4">
            <p class="small mb-0">No account? <a href="/register" class="link-text">Register Now</a></p>
        </div>
    </div>
</body>

</html>
