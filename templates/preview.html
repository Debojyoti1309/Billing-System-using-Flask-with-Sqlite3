<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Preview - Demo Co Inn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --brand-primary: #5a2d82;
            --brand-accent: #c5a059;
            --bg-light: #f4f7f6;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('https://images.pexels.com/photos/3183150/pexels-photo-3183150.jpeg?auto=compress&cs=tinysrgb&w=1600');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            color: #2d3436;
            min-height: 100vh;
        }

        /* --- UPDATED NAVIGATION BAR ONLY --- */
        .dashboard-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 0.8rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            border-bottom: 3px solid #8c4bcc;
        }

        .brand-title {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--brand-primary);
            letter-spacing: -0.5px;
            text-transform: uppercase;
            text-decoration: none;
            transition: transform 0.3s ease;
        }

        .brand-title:hover { transform: scale(1.02); color: var(--brand-primary); }

        .nav-links { display: flex; align-items: center; }

        .nav-links a {
            position: relative;
            color: #333;
            text-decoration: none;
            margin-left: 10px;
            padding: 8px 15px;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        /* Glass highlight effect */
        .nav-links a:hover {
            background: rgba(90, 45, 130, 0.1);
            color: var(--brand-primary);
        }

        /* Sliding underline effect */
        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 4px;
            left: 50%;
            background-color: #ffd700; /* Gold contrast */
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav-links a:hover::after {
            width: 50%;
        }

        /* Logout specific hover */
        .nav-links a[href="/logout"]:hover {
            background: rgba(255, 193, 7, 0.2);
            color: #d39e00 !important;
        }

        /* --- REST OF THE STYLES REMAIN UNCHANGED --- */
        .preview-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .preview-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }

        .page-header h2 {
            font-weight: 800;
            color: var(--brand-primary);
            margin: 0;
            font-size: 1.5rem;
        }

        iframe {
            width: 100%;
            height: 750px;
            border: 1px solid #eee;
            border-radius: 12px;
            background: #fdfdfd;
        }

        .btn-action {
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: 0.3s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-print { background: #e9ecef; color: #495057; }
        .btn-download { background: var(--brand-primary); color: white; }
        .btn-history { background: white; color: var(--brand-primary); border: 1px solid var(--brand-primary); }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            filter: brightness(95%);
            color: inherit;
        }

        .button-group {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 30px;
        }

        @media print {
            body * { visibility: hidden; }
            #billFrame, #billFrame * { visibility: visible; }
            #billFrame { 
                position: absolute; 
                left: 0; 
                top: 0; 
                width: 100%; 
                height: 100%; 
            }
        }
    </style>
</head>
<body>

<nav class="dashboard-nav">
    <a href="/dashboard" class="brand-title">Demo Co Inn Welfare Trust</a>
    <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/create">Create</a>
        <a href="/invoice_history">History</a>
        <a href="/logout" style="color: #ffc107;">Logout</a>
    </div>
</nav>

<div class="preview-container">
    <div class="preview-card">
        <div class="page-header">
            <h2><i class="bi bi-file-earmark-pdf"></i> Invoice Preview</h2>
            <span class="badge rounded-pill" style="background: var(--brand-primary); padding: 8px 15px;">Official Document</span>
        </div>

        <iframe id="billFrame" src="/pdf/{{inv}}"></iframe>

        <div class="button-group">
            <button onclick="printBill()" class="btn-action btn-print">
                <i class="bi bi-printer"></i> Print
            </button>

            <a href="/pdf/{{inv}}" download class="btn-action btn-download">
                <i class="bi bi-cloud-arrow-down"></i> Download PDF
            </a>

            <a href="/invoice_history" class="btn-action btn-history">
                <i class="bi bi-clock-history"></i> All Records
            </a>
            <a href="https://wa.me/{{ invoice.phone }}?text=Hello%20{{ invoice.customer }},%20your%20invoice%20{{ inv }}%20from%20Friends%20Forever%20is%20ready.%20Total:%20Rs.{{ invoice.total }}" 
   target="_blank" 
   class="btn-action" 
   style="background-color: #25D366; color: white; text-decoration: none;">
    <i class="bi bi-whatsapp"></i> Send to WhatsApp
            </a>
        </div>
    </div>

    <div class="text-center mt-4 text-white small" style="text-shadow: 0 2px 4px rgba(0,0,0,0.5);">
        <p>&copy; 2026 Demo Co Inn | Secure Billing Gateway</p>
    </div>
</div>

<script>
    function printBill() {
        const frm = document.getElementById('billFrame').contentWindow;
        frm.focus();
        frm.print();
    }
</script>

</body>

</html>
