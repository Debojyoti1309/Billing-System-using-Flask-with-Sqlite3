<!DOCTYPE html>
<html>
<head>
    <title>Reset Password - Friends Forever</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #210333 0%, #5a2d82 50%, #210333 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: 'Poppins', sans-serif; margin: 0;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 25px;
            padding: 40px; width: 100%; max-width: 400px; color: white; text-align: center;
        }
        
        /* Fixed Input Styling */
        .form-control {
            background: rgba(255, 255, 255, 0.15) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px;
            color: #ffffff !important; 
            padding: 12px; 
            margin-bottom: 15px;
        }

        /* Changes placeholder color to light grey/white so it's visible */
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.7) !important;
        }

        /* IMPORTANT: Fixes the white-on-white text during Browser Autofill */
        .form-control:-webkit-autofill,
        .form-control:-webkit-autofill:hover, 
        .form-control:-webkit-autofill:focus {
            -webkit-text-fill-color: white !important;
            -webkit-box-shadow: 0 0 0px 1000px #411d5e inset !important; /* Matches your theme */
            transition: background-color 5000s ease-in-out 0s;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.25) !important;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            color: white !important;
            outline: none;
        }

        .btn-reset {
            background: #ffc107; color: #210333; border: none; border-radius: 12px;
            padding: 12px; font-weight: bold; width: 100%; transition: 0.3s;
            margin-top: 10px;
        }
        .btn-reset:hover { background: #ffdb70; transform: translateY(-2px); }
        
        hr { opacity: 0.3; }
    </style>
</head>
<body>
    <div class="glass-card shadow">
        <i class="bi bi-shield-lock-fill mb-3" style="font-size: 3rem; color: #ffc107;"></i>
        <h2 class="fw-bold mb-4">Reset Password</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} small py-2">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="post">
            <input type="text" name="username" class="form-control" placeholder="Your Username" required>
            <input type="text" name="phone" class="form-control" placeholder="Registered Phone Number" required>
            <hr>
            <input type="password" name="new_password" class="form-control" placeholder="Enter New Password" required>
            <button type="submit" class="btn btn-reset shadow-sm">Update Password</button>
        </form>
        
        <div class="mt-4">
            <a href="/" class="text-white text-decoration-none small opacity-75">
                <i class="bi bi-arrow-left"></i> Back to Login
            </a>
        </div>
    </div>
</body>
</html>
