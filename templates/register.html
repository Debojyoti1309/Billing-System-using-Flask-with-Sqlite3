<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration - Friends Forever</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            /* Same Deep Purple Gradient as Login */
            background: linear-gradient(135deg, #210333 0%, #5a2d82 50%, #210333 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            margin: 0;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            color: white;
            text-align: center;
        }

        .brand-icon {
            font-size: 50px;
            color: #ffccff;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(255,204,255,0.5));
        }

        .form-control {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 12px;
            color: white !important;
            padding: 12px 15px;
            margin-bottom: 20px;
        }

        .form-control::placeholder { color: rgba(255, 255, 255, 0.7); }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
            outline: none;
        }

        .btn-reg {
            background: #ffffff;
            color: #5a2d82;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }

        .btn-reg:hover {
            background: #ffccff;
            transform: translateY(-3px);
        }

        /* Error Message Style */
        .error-box {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff9999;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .login-link { 
            color: #ffccff; 
            text-decoration: none; 
            font-weight: bold;
        }
        .login-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="glass-card shadow">
    <i class="bi bi-person-plus-fill brand-icon"></i>
    <h2 class="fw-bold mb-1">Create Account</h2>
    <p class="small opacity-75 mb-4">Join the Trust Admin Team</p>

    {% if error %}
        <div class="error-box">
            <i class="bi bi-exclamation-circle-fill"></i> {{ error }}
        </div>
    {% endif %}

    <form method="post" action="/register">
        <div class="position-relative">
            <input type="text" name="username" class="form-control" placeholder="New Username" required>
        </div>

        <div class="position-relative">
            <input type="text" name="phone" class="form-control" placeholder="Mobile Number (For Recovery)" required>
        </div>

        <div class="position-relative">
            <input type="password" name="password" class="form-control" placeholder="New Password" required>
        </div>

        <button type="submit" class="btn btn-reg shadow-sm">REGISTER</button>
    </form>

    <div class="mt-4">
        <p class="small mb-1">Already have an account?</p>
        <a href="/" class="login-link">Login Now</a>
    </div>
</div>

</body>
</html>
